<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<meta name="apple-mobile-web-app-capable" content="yes">

<title>Mega Brick Finder</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f;
    --surface: #1e1e2a;
    --surface2: #28283a;
    --border: #4a4a64;
    --accent: #FFD600;
    --accent2: #e8380d;
    --cyan: #00C8FF;
    --text: #f0f0f5;
    --muted: #6b6b80;
    --success: #2ecc71;
    --radius: 16px;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }
  body { display: flex; flex-direction: column; min-height: 100dvh; }
  header { padding: 16px 20px 0; display: flex; align-items: center; gap: 14px; position: relative; z-index: 10; }
  .logo-svg { width: 54px; height: 54px; flex-shrink: 0; }
  .logo-text-block { line-height: 1; }
  .logo-title { font-family: 'Arial Black', 'Bebas Neue', sans-serif; font-weight: 900; font-size: 22px; letter-spacing: 1px; line-height: 1; }
  .logo-title span.cyan { color: var(--cyan); }
  .logo-title span.yellow { color: var(--accent); }
  .logo-sub { font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 3px; }
  main { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 18px; max-width: 600px; width: 100%; margin: 0 auto; }
  .camera-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  #preview-area { width: 100%; aspect-ratio: 1; background: var(--surface2); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; position: relative; overflow: hidden; }
  #preview-area.has-image { aspect-ratio: auto; }
  #captured-img { width: 100%; max-height: 320px; object-fit: contain; display: none; }
  #preview-area.has-image #captured-img { display: block; }
  #preview-area.has-image .placeholder-content { display: none; }
  .placeholder-content { display: flex; flex-direction: column; align-items: center; gap: 10px; color: var(--muted); }
  .camera-icon { width: 64px; height: 64px; border: 2px dashed var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; }
  .placeholder-content p { font-size: 14px; text-align: center; max-width: 200px; line-height: 1.4; }
  .corner { position: absolute; width: 20px; height: 20px; border-color: var(--accent); border-style: solid; opacity: 0.6; }
  .corner.tl { top: 12px; left: 12px; border-width: 2px 0 0 2px; border-radius: 3px 0 0 0; }
  .corner.tr { top: 12px; right: 12px; border-width: 2px 2px 0 0; border-radius: 0 3px 0 0; }
  .corner.bl { bottom: 12px; left: 12px; border-width: 0 0 2px 2px; border-radius: 0 0 0 3px; }
  .corner.br { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; border-radius: 0 0 3px 0; }
  .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); }
  .btn-row button { background: var(--surface); border: none; color: var(--text); padding: 14px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.15s; -webkit-tap-highlight-color: transparent; }
  .btn-row button:active { background: var(--surface2); }
  .btn-row button.primary { color: var(--accent); }
  #file-input { display: none; }
  #identify-btn { width: 100%; background: var(--accent); color: #000; border: none; border-radius: var(--radius); padding: 16px; font-family: 'Arial Black', sans-serif; font-size: 18px; font-weight: 900; letter-spacing: 2px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.2s; -webkit-tap-highlight-color: transparent; box-shadow: 0 4px 20px rgba(255,214,0,0.3); }
  #identify-btn:disabled { background: var(--surface2); color: var(--muted); box-shadow: none; cursor: not-allowed; }
  #identify-btn:not(:disabled):active { transform: scale(0.98); box-shadow: 0 2px 10px rgba(255,214,0,0.2); }
  .divider { display: flex; align-items: center; gap: 12px; color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .manual-row { display: flex; gap: 10px; }
  .manual-row input { flex: 1; background: var(--surface); border: 2px solid var(--border); border-radius: var(--radius); padding: 14px 16px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; transition: border-color 0.2s; -webkit-appearance: none; }
  .manual-row input:focus { border-color: var(--accent); }
  .manual-row input::placeholder { color: var(--muted); }
  .manual-row button { background: var(--surface2); border: 2px solid var(--border); border-radius: var(--radius); color: var(--text); padding: 14px 18px; font-size: 18px; cursor: pointer; transition: all 0.15s; -webkit-tap-highlight-color: transparent; }
  .manual-row button:active { background: var(--border); }
  #status { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; font-size: 14px; color: var(--muted); display: none; align-items: center; gap: 10px; }
  #status.visible { display: flex; }
  #status.error { border-color: var(--accent2); color: #ff6b6b; }
  #status.success { border-color: var(--success); color: var(--success); }
  .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #results { display: none; flex-direction: column; gap: 16px; }
  #results.visible { display: flex; }
  .part-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .part-header { display: flex; gap: 16px; padding: 16px; align-items: flex-start; }
  .part-img { width: 80px; height: 80px; object-fit: contain; background: var(--surface2); border-radius: 10px; flex-shrink: 0; border: 1px solid var(--border); }
  .part-img-placeholder { width: 80px; height: 80px; background: var(--surface2); border-radius: 10px; flex-shrink: 0; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 28px; }
  .part-info { flex: 1; min-width: 0; }
  .part-num { font-family: 'Arial Black', sans-serif; font-size: 20px; font-weight: 900; letter-spacing: 1px; color: var(--accent); line-height: 1; }
  .part-name { font-size: 14px; color: var(--text); margin-top: 4px; line-height: 1.3; }
  .part-alias { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .part-meta { font-size: 12px; color: var(--muted); margin-top: 6px; display: flex; gap: 12px; flex-wrap: wrap; }
  .part-meta a { color: var(--muted); text-decoration: none; }
  .score-badge { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 4px 10px; font-size: 12px; color: var(--accent); font-weight: 600; flex-shrink: 0; align-self: flex-start; }
  .sets-label { padding: 12px 16px 10px; font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); font-weight: 600; border-top: 1px solid var(--border); }
  .set-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-top: 1px solid var(--border); transition: background 0.15s; cursor: pointer; }
  .set-row:active { background: var(--surface2); }
  .set-dot { width: 8px; height: 8px; background: var(--cyan); border-radius: 50%; flex-shrink: 0; }
  .set-info { flex: 1; min-width: 0; }
  .set-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .set-detail { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .set-qty { font-family: 'Arial Black', sans-serif; font-size: 20px; font-weight: 900; color: var(--accent); flex-shrink: 0; }
  .no-sets { padding: 16px; text-align: center; color: var(--muted); font-size: 14px; border-top: 1px solid var(--border); }
  .color-swatch { display: inline-block; width: 10px; height: 10px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); margin-right: 4px; vertical-align: middle; flex-shrink: 0; }
  .candidates-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; padding: 14px 16px 10px; font-weight: 600; }
  .candidate-btn { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-top: 1px solid var(--border); background: none; border-left: none; border-right: none; border-bottom: none; color: var(--text); font-family: 'DM Sans', sans-serif; cursor: pointer; width: 100%; text-align: left; transition: background 0.15s; -webkit-tap-highlight-color: transparent; }
  .candidate-btn:active { background: var(--surface2); }
  .candidate-img { width: 80px; height: 80px; object-fit: contain; background: var(--surface2); border-radius: 8px; border: 1px solid var(--border); flex-shrink: 0; }
  .candidate-info { flex: 1; min-width: 0; }
  .candidate-num { font-size: 13px; color: var(--accent); font-weight: 600; }
  .candidate-name { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .candidate-score { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding: 24px; }
  .lightbox img { max-width: 100%; max-height: 60vh; object-fit: contain; border-radius: 12px; }
  .lightbox-name { font-size: 16px; font-weight: 500; text-align: center; color: var(--text); }
  .lightbox-close { position: absolute; top: 20px; right: 20px; background: var(--surface2); border: 1px solid var(--border); border-radius: 50%; width: 40px; height: 40px; color: var(--text); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .set-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 200; display: flex; flex-direction: column; padding: 24px; gap: 16px; overflow-y: auto; }
  .set-modal-header { display: flex; justify-content: space-between; align-items: flex-start; }
  .set-modal img { width: 100%; max-height: 260px; object-fit: contain; border-radius: 12px; background: var(--surface2); border: 1px solid var(--border); }
  .set-modal-title { font-family: 'Arial Black', sans-serif; font-size: 20px; font-weight: 900; color: var(--accent); line-height: 1.2; }
  .set-modal-meta { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .set-modal-link { display: block; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; color: var(--cyan); text-decoration: none; font-size: 14px; text-align: center; }
  .modal-close { background: var(--surface2); border: 1px solid var(--border); border-radius: 50%; width: 40px; height: 40px; color: var(--text); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  footer { padding: 16px 20px; text-align: center; font-size: 11px; color: var(--muted); letter-spacing: 0.5px; }
  .loading-overlay { position: fixed; inset: 0; background: rgba(10,10,15,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 100; backdrop-filter: blur(4px); opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .loading-overlay.visible { opacity: 1; pointer-events: all; }
  .loading-overlay .big-spinner { width: 48px; height: 48px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  .loading-overlay p { font-family: 'Arial Black', sans-serif; font-size: 16px; letter-spacing: 2px; color: var(--muted); }
</style>
</head>
<body>

  <div class="logo-text-block">
    <div class="logo-title"><span class="yellow">MEGA</span> <span class="cyan">BRICK</span> <span class="yellow">FINDER</span></div>
    <div class="logo-sub">Scan · Identify · Find</div>
  </div>
</header>
<main>
  <div class="camera-card">
    <div id="preview-area">
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
      <div class="placeholder-content">
        <div class="camera-icon">📷</div>
        <p>Take a photo of a LEGO part to identify it</p>
      </div>
      <img id="captured-img" alt="Captured part">
    </div>
    <div class="btn-row">
      <button class="primary" onclick="document.getElementById('file-input').click()">📷 Take Photo</button>
      <button onclick="clearImage()">✕ Clear</button>
    </div>
  </div>
  <input type="file" id="file-input" accept="image/*" capture="environment">
  <button id="identify-btn" disabled onclick="identifyPart()">🔍 IDENTIFY PART</button>

    <input type="text" id="manual-input" placeholder="Part number (e.g. 3001)" autocomplete="off" autocorrect="off" spellcheck="false">

  </div>

  <div id="results"></div>

<footer>Powered by Brickognize &amp; Rebrickable</footer>
<script>
const SHEETS_API = 'https://script.google.com/macros/s/AKfycbwWY3esy4NF6Ejt1n91NPPdX-qiXvCfGqpwddxbtuV2KbDKO_Yp0CdUrE1e0zI82K3F/exec';
const RB_API_KEY = 'ca9806a231f7e5c7b07d05d39c4651f2';

let capturedFile = null;
let partsInventory = [];
let setsInventory = [];
let inventoryLoaded = false;
let legoColorMap = {};
let colorsLoaded = false;
let lastBackPress = 0;

// ── EXIT HANDLING ─────────────────────────────────────────────────────────────
history.pushState({ app: true }, '');

window.addEventListener('popstate', function() {
  const lightbox = document.querySelector('.lightbox');
  const setModal = document.querySelector('.set-modal');
  if (lightbox) { lightbox.remove(); history.pushState({ app: true }, ''); return; }
  if (setModal) { setModal.remove(); history.pushState({ app: true }, ''); return; }

  const now = Date.now();
  if (now - lastBackPress < 2000) {
    return;
  }
  lastBackPress = now;
  history.pushState({ app: true }, '');
  showExitToast();
});

function showExitToast() {
  const existing = document.getElementById('exit-toast');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.id = 'exit-toast';
  toast.style.cssText = `
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 14px; padding: 12px 20px; border-radius: 24px;
    z-index: 300; white-space: nowrap;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  `;
  toast.textContent = 'Press back again to exit';
  document.body.appendChild(toast);
  setTimeout(() => { if (toast.parentNode) toast.remove(); }, 2000);
}

// ── FILE INPUT ────────────────────────────────────────────────────────────────
document.getElementById('file-input').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  capturedFile = file;
  document.getElementById('captured-img').src = URL.createObjectURL(file);
  document.getElementById('preview-area').classList.add('has-image');
  document.getElementById('identify-btn').disabled = false;
  clearResults();
});

document.getElementById('manual-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') manualLookup();
});

loadInventory();
loadColors();

// ── INVENTORY ─────────────────────────────────────────────────────────────────
async function loadInventory() {
  try {
    const [partsRes, setsRes] = await Promise.all([
      fetch(`${SHEETS_API}?action=getParts`),
      fetch(`${SHEETS_API}?action=getSets`)
    ]);
    partsInventory = await partsRes.json();
    setsInventory = await setsRes.json();
    inventoryLoaded = true;
  } catch(e) { console.error('Failed to load inventory:', e); }
}

// ── COLORS ────────────────────────────────────────────────────────────────────
async function loadColors() {
  try {
    let url = `https://rebrickable.com/api/v3/lego/colors/?page_size=200&key=${RB_API_KEY}`;
    while (url) {
      const res = await fetch(url);
      const data = await res.json();
      data.results.forEach(color => {
        if (color.rgb) {
          const hex = color.rgb;
          legoColorMap[color.name] = {
            r: parseInt(hex.substring(0,2), 16),
            g: parseInt(hex.substring(2,4), 16),
            b: parseInt(hex.substring(4,6), 16)
          };
        }
      });
      url = data.next ? data.next + `&key=${RB_API_KEY}` : null;
    }
    colorsLoaded = true;
  } catch(e) { console.error('Failed to load colors:', e); }
}

// ── IMAGE COMPRESSION ─────────────────────────────────────────────────────────
function compressImage(file, maxSize, quality) {
  return new Promise((resolve) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      if (w > h && w > maxSize) { h = h * maxSize / w; w = maxSize; }
      else if (h > maxSize) { w = w * maxSize / h; h = maxSize; }
      canvas.width = w;
      canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      canvas.toBlob(resolve, 'image/jpeg', quality);
    };
    img.src = url;
  });
}

// ── RESOLVE CANONICAL PART ────────────────────────────────────────────────────
async function resolveCanonicalPart(partNum) {
  try {
    const res = await fetch(`https://rebrickable.com/api/v3/lego/parts/${partNum}/?inc_part_details=1&key=${RB_API_KEY}`);
    if (res.ok) {
      const part = await res.json();
      const allNums = [part.part_num];
      if (part.molds) part.molds.forEach(m => allNums.push(m.toString()));
      if (part.alternates) part.alternates.forEach(a => allNums.push(a.toString()));
      if (part.print_of) allNums.push(part.print_of.toString());
      return { part, canonicalNum: part.part_num, allNums };
    }
    const blRes = await fetch(`https://rebrickable.com/api/v3/lego/parts/?bricklink_id=${partNum}&key=${RB_API_KEY}`);
    if (blRes.ok) {
      const blData = await blRes.json();
      if (blData.results && blData.results.length > 0) {
        const part = blData.results[0];
        const allNums = [part.part_num];
        if (part.molds) part.molds.forEach(m => allNums.push(m.toString()));
        if (part.alternates) part.alternates.forEach(a => allNums.push(a.toString()));
        if (part.print_of) allNums.push(part.print_of.toString());
        return { part, canonicalNum: part.part_num, allNums };
      }
    }
    const searchRes = await fetch(`https://rebrickable.com/api/v3/lego/parts/?search=${partNum}&key=${RB_API_KEY}`);
    if (searchRes.ok) {
      const data = await searchRes.json();
      if (data.results && data.results.length > 0) {
        const part = data.results[0];
        return { part, canonicalNum: part.part_num, allNums: [part.part_num] };
      }
    }
  } catch(e) {}
  return null;
}

// ── CAMERA ────────────────────────────────────────────────────────────────────
function clearImage() {
  capturedFile = null;
  document.getElementById('captured-img').src = '';
  document.getElementById('preview-area').classList.remove('has-image');
  document.getElementById('identify-btn').disabled = true;
  document.getElementById('file-input').value = '';
  clearResults();
}

// ── IDENTIFY ──────────────────────────────────────────────────────────────────
async function identifyPart() {
  if (!capturedFile) return;
  showLoading('IDENTIFYING PART...');
  try {
    // Compress image before sending to Brickognize
    const compressed = await compressImage(capturedFile, 1000, 0.85);
    const formData = new FormData();
    formData.append('query_image', new File([compressed], 'image.jpg', { type: 'image/jpeg' }));
    const res = await fetch('https://api.brickognize.com/predict/', { method: 'POST', body: formData });
    if (!res.ok) throw new Error(`Brickognize error: ${res.status} — ${await res.text()}`);
    const data = await res.json();
    hideLoading();
    if (!data.items || data.items.length === 0) { showStatus('No parts identified. Try a clearer photo.', 'error'); return; }
    const items = data.items;
    if (items.length === 1 || items[0].score > 0.85) { await showPartResult(items[0]); }
    else { showCandidates(items.slice(0, 5)); }
  } catch(e) { hideLoading(); showStatus(`Error: ${e.message}`, 'error'); }
}

// ── MANUAL LOOKUP ─────────────────────────────────────────────────────────────
async function manualLookup() {
  const partNum = document.getElementById('manual-input').value.trim();
  if (!partNum) return;
  showLoading('LOOKING UP PART...');
  try {
    const resolved = await resolveCanonicalPart(partNum);
    if (!resolved) throw new Error(`Part ${partNum} not found`);
    const { part, canonicalNum, allNums } = resolved;
    hideLoading();
    await showPartResult({
      id: canonicalNum,
      name: part.name,
      img_url: part.part_img_url,
      score: 1,
      original_id: partNum !== canonicalNum ? partNum : null,
      alternate_ids: allNums,
      external_sites: [
        { name: 'Rebrickable', url: part.part_url || `https://rebrickable.com/parts/${canonicalNum}/` },
        { name: 'BrickLink', url: `https://www.bricklink.com/v2/search.page?q=${canonicalNum}` }
      ]
    });
  } catch(e) { hideLoading(); showStatus(`${e.message}`, 'error'); }
}

// ── CANDIDATES ────────────────────────────────────────────────────────────────
function showCandidates(items) {
  clearResults();
  const results = document.getElementById('results');
  results.classList.add('visible');
  const card = document.createElement('div');
  card.className = 'part-card';
  card.innerHTML = `<div class="candidates-label">Multiple matches — tap to select</div>`;
  items.forEach(item => {
    const btn = document.createElement('button');
    btn.className = 'candidate-btn';
    btn.innerHTML = `
      <img class="candidate-img" src="${item.img_url || ''}" onerror="this.style.display='none'" alt="">
      <div class="candidate-info">
        <div class="candidate-num">${item.id}</div>
        <div class="candidate-name">${item.name || ''}</div>
        <div class="candidate-score">${Math.round((item.score || 0) * 100)}% confidence</div>
      </div>
      <div style="font-size:18px;color:var(--muted);padding-left:8px;">›</div>
    `;
    btn.querySelector('img').addEventListener('click', (e) => { e.stopPropagation(); showLightbox(item.img_url, item.name); });
    btn.addEventListener('click', () => showPartResult(item));
    card.appendChild(btn);
  });
  results.appendChild(card);
}

// ── COLOR DETECTION ───────────────────────────────────────────────────────────
function getDominantColor(imgElement) {
  try {
    const canvas = document.createElement('canvas');
    canvas.width = 100; canvas.height = 100;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(imgElement, 0, 0, 100, 100);
    const data = ctx.getImageData(25, 25, 50, 50).data;
    let r = 0, g = 0, b = 0, count = 0;
    for (let i = 0; i < data.length; i += 4) {
      const brightness = (data[i] + data[i+1] + data[i+2]) / 3;
      if (brightness > 240 || brightness < 15) continue;
      r += data[i]; g += data[i+1]; b += data[i+2]; count++;
    }
    if (count === 0) return null;
    return { r: Math.round(r/count), g: Math.round(g/count), b: Math.round(b/count) };
  } catch(e) { return null; }
}

function matchLegoColor(rgb, availableColors) {
  if (!rgb || !colorsLoaded) return null;
  let bestMatch = null, bestDistance = Infinity;
  availableColors.forEach(colorName => {
    const known = legoColorMap[colorName];
    if (!known) return;
    const dist = Math.sqrt(Math.pow(rgb.r-known.r,2) + Math.pow(rgb.g-known.g,2) + Math.pow(rgb.b-known.b,2));
    if (dist < bestDistance) { bestDistance = dist; bestMatch = colorName; }
  });
  return bestDistance < 150 ? { color: bestMatch, confidence: Math.round((1 - bestDistance/150) * 100) } : null;
}

function legoColorToHex(colorName) {
  const c = legoColorMap[colorName];
  return c ? `rgb(${c.r},${c.g},${c.b})` : '#888888';
}

// ── PART RESULT ───────────────────────────────────────────────────────────────
async function showPartResult(item) {
  clearResults();
  if (!inventoryLoaded) { showLoading('LOADING INVENTORY...'); await loadInventory(); hideLoading(); }

  const partNum = item.id;
  const scorePercent = item.score < 1 ? Math.round(item.score * 100) + '%' : null;

  // Resolve canonical part to get molds/alternates/prints
  const resolved = await resolveCanonicalPart(partNum);
  const allNums = resolved ? [...new Set([...resolved.allNums, partNum])] : [partNum];
  if (item.alternate_ids) {
    item.alternate_ids.forEach(n => { if (!allNums.includes(n.toString())) allNums.push(n.toString()); });
  }
  const searchNums = allNums.map(n => n.toString().toLowerCase());

  const allMatches = partsInventory.filter(p =>
    p['Part Number'] && searchNums.includes(p['Part Number'].toString().toLowerCase())
  );

  // Update item to canonical if different
  if (resolved && resolved.canonicalNum !== partNum && !item.original_id) {
    item.original_id = partNum;
    item.id = resolved.canonicalNum;
    item.name = item.name || resolved.part.name;
    item.img_url = item.img_url || resolved.part.part_img_url;
  }

  // Color detection
  let detectedColor = null;
  if (capturedFile) {
    const tempImg = new Image();
    await new Promise(resolve => { tempImg.onload = resolve; tempImg.src = URL.createObjectURL(capturedFile); });
    const availableColors = [...new Set(allMatches.map(m => m['Color']))];
    detectedColor = matchLegoColor(getDominantColor(tempImg), availableColors);
  }

  const bySet = {};
  allMatches.forEach(m => {
    if (!bySet[m['Set Number']]) bySet[m['Set Number']] = [];
    bySet[m['Set Number']].push(m);
  });

  const setNameMap = {};
  setsInventory.forEach(s => { setNameMap[s['Set Number']] = s['Name']; });

  const results = document.getElementById('results');
  results.classList.add('visible');

  const card = document.createElement('div');
  card.className = 'part-card';

  const imgHtml = item.img_url
    ? `<img class="part-img" src="${item.img_url}" alt="${item.name || ''}" onerror="this.parentElement.innerHTML='<div class=\\'part-img-placeholder\\'>🧱</div>'">`
    : `<div class="part-img-placeholder">🧱</div>`;

  const externalLinks = [];
  externalLinks.push(`<a href="https://rebrickable.com/parts/${item.id}/" target="_blank" rel="noopener noreferrer">Rebrickable ↗</a>`);
  if (item.external_sites && item.external_sites.length > 0) {
    item.external_sites.forEach(site => {
      if (site.name.toLowerCase() !== 'rebrickable') {
        externalLinks.push(`<a href="${site.url}" target="_blank" rel="noopener noreferrer">${site.name} ↗</a>`);
      }
    });
  } else {
    externalLinks.push(`<a href="https://www.bricklink.com/v2/search.page?q=${item.id}" target="_blank" rel="noopener noreferrer">BrickLink ↗</a>`);
  }

  const otherNums = allNums.filter(n => n.toLowerCase() !== item.id.toLowerCase());
  const aliasText = otherNums.length > 0 ? `Also known as: ${otherNums.join(', ')}` : '';

  const colorBar = detectedColor ? `
    <div style="padding:10px 16px;border-top:1px solid var(--border);font-size:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
      <span style="color:var(--muted);text-transform:uppercase;letter-spacing:1px;">Best color match:</span>
      <span class="color-swatch" style="background:${legoColorToHex(detectedColor.color)}"></span>
      <span style="color:var(--text);font-weight:600;">${detectedColor.color}</span>
      <button onclick="filterByColor('${detectedColor.color}')" style="margin-left:auto;background:var(--accent);border:none;border-radius:6px;color:#000;font-size:11px;font-weight:700;padding:4px 10px;cursor:pointer;">Filter by this color</button>
    </div>` : '';

  const setCount = Object.keys(bySet).length;

  card.innerHTML = `
    <div class="part-header">
      ${imgHtml}
      <div class="part-info">
        <div class="part-num">${item.id}</div>
        <div class="part-name">${item.name || 'Unknown part'}</div>
        ${aliasText ? `<div class="part-alias">${aliasText}</div>` : ''}
        <div class="part-meta">${externalLinks.join('')}</div>
      </div>
      ${scorePercent ? `<div class="score-badge">${scorePercent}</div>` : ''}
    </div>
    ${colorBar}
    <div class="sets-label">Found in ${setCount} set(s) in your collection</div>
  `;

  if (setCount === 0) {
    card.innerHTML += `<div class="no-sets">This part isn't in any of your sets.</div>`;
  } else {
    Object.entries(bySet).forEach(([setNum, parts]) => {
      const setName = setNameMap[setNum] || setNum;
      const colorSwatches = [...new Set(parts.map(p => p['Color']))].map(color =>
        `<span class="color-swatch" style="background:${legoColorToHex(color)}" title="${color}"></span><span style="font-size:12px;color:var(--muted);margin-right:8px;">${color}</span>`
      ).join('');
      const totalQty = parts.reduce((sum, p) => sum + (parseInt(p['Quantity']) || 0), 0);
      const row = document.createElement('div');
      row.className = 'set-row';
      row.innerHTML = `
        <div class="set-dot"></div>
        <div class="set-info">
          <div class="set-name">${setName}</div>
          <div class="set-detail" style="margin-top:2px;">${setNum}</div>
          <div style="display:flex;flex-wrap:wrap;align-items:center;gap:4px;margin-top:4px;">${colorSwatches}</div>
        </div>
        <div class="set-qty">×${totalQty}</div>
        <div style="font-size:18px;color:var(--muted);padding-left:8px;">›</div>
      `;
      row.addEventListener('click', () => showSetModal(setNum, setName));
      card.appendChild(row);
    });
  }

  results.appendChild(card);
}

// ── COLOR FILTER ──────────────────────────────────────────────────────────────
function filterByColor(colorName) {
  const partNum = document.querySelector('.part-num')?.textContent;
  if (!partNum) return;
  const filtered = partsInventory.filter(p =>
    p['Part Number'] && p['Part Number'].toString().toLowerCase() === partNum.toLowerCase() && p['Color'] === colorName
  );
  const setNameMap = {};
  setsInventory.forEach(s => { setNameMap[s['Set Number']] = s['Name']; });
  const bySet = {};
  filtered.forEach(m => {
    if (!bySet[m['Set Number']]) bySet[m['Set Number']] = [];
    bySet[m['Set Number']].push(m);
  });

  const card = document.querySelector('.part-card');
  const setsLabel = card.querySelector('.sets-label');
  setsLabel.textContent = `Found in ${Object.keys(bySet).length} set(s) — filtered by ${colorName}`;
  card.querySelectorAll('.set-row').forEach(r => r.remove());
  const existing = card.querySelector('[data-filter-bar]');
  if (existing) existing.remove();

  const showAllBar = document.createElement('div');
  showAllBar.setAttribute('data-filter-bar', '1');
  showAllBar.style.cssText = 'padding:10px 16px;border-top:1px solid var(--border);font-size:12px;display:flex;align-items:center;gap:8px;';
  showAllBar.innerHTML = `
    <span class="color-swatch" style="background:${legoColorToHex(colorName)}"></span>
    <span style="color:var(--text);font-weight:600;">${colorName}</span>
    <button onclick="showAllColorsForPart('${partNum}')" style="margin-left:auto;background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:11px;padding:4px 10px;cursor:pointer;">Show all colors</button>
  `;
  setsLabel.after(showAllBar);

  if (Object.keys(bySet).length === 0) {
    const noSets = document.createElement('div');
    noSets.className = 'no-sets';
    noSets.textContent = `No sets found with this part in ${colorName}.`;
    card.appendChild(noSets);
  } else {
    Object.entries(bySet).forEach(([setNum, parts]) => {
      const setName = setNameMap[setNum] || setNum;
      const colorSwatches = [...new Set(parts.map(p => p['Color']))].map(color =>
        `<span class="color-swatch" style="background:${legoColorToHex(color)}" title="${color}"></span><span style="font-size:12px;color:var(--muted);margin-right:8px;">${color}</span>`
      ).join('');
      const totalQty = parts.reduce((sum, p) => sum + (parseInt(p['Quantity']) || 0), 0);
      const row = document.createElement('div');
      row.className = 'set-row';
      row.innerHTML = `
        <div class="set-dot"></div>
        <div class="set-info">
          <div class="set-name">${setName}</div>
          <div class="set-detail" style="margin-top:2px;">${setNum}</div>
          <div style="display:flex;flex-wrap:wrap;align-items:center;gap:4px;margin-top:4px;">${colorSwatches}</div>
        </div>
        <div class="set-qty">×${totalQty}</div>
        <div style="font-size:18px;color:var(--muted);padding-left:8px;">›</div>
      `;
      row.addEventListener('click', () => showSetModal(setNum, setName));
      card.appendChild(row);
    });
  }
}

function showAllColorsForPart(partNum) {
  const savedFile = capturedFile;
  capturedFile = null;
  showPartResult({ id: partNum, name: document.querySelector('.part-name')?.textContent, img_url: document.querySelector('.part-img')?.src, score: 1 });
  capturedFile = savedFile;
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function showStatus(msg, type = '') {
  const el = document.getElementById('status');
  el.className = `visible ${type}`;
  el.innerHTML = type === 'loading' ? `<div class="spinner"></div><span>${msg}</span>` : `<span>${msg}</span>`;
}

function clearResults() {
  document.getElementById('results').classList.remove('visible');
  document.getElementById('results').innerHTML = '';
  document.getElementById('status').className = '';
}

function showLoading(msg) {
  document.getElementById('loading-text').textContent = msg;
  document.getElementById('loading-overlay').classList.add('visible');
}

function hideLoading() {
  document.getElementById('loading-overlay').classList.remove('visible');
}

function pushModalState() { history.pushState({ modal: true }, ''); }

// ── LIGHTBOX ──────────────────────────────────────────────────────────────────
function showLightbox(imgUrl, name) {
  pushModalState();
  const lb = document.createElement('div');
  lb.className = 'lightbox';
  lb.innerHTML = `
    <button class="lightbox-close" onclick="this.parentElement.remove();history.pushState({app:true},'')">✕</button>
    <img src="${imgUrl}" alt="${name || ''}">
    <div class="lightbox-name">${name || ''}</div>
  `;
  lb.addEventListener('click', (e) => { if (e.target === lb) { lb.remove(); history.pushState({app:true},''); } });
  document.body.appendChild(lb);
}

// ── SET MODAL ─────────────────────────────────────────────────────────────────
async function showSetModal(setNum, setName) {
  pushModalState();
  const modal = document.createElement('div');
  modal.className = 'set-modal';
  modal.innerHTML = `
    <div class="set-modal-header">
      <div>
        <div class="set-modal-title">${setName}</div>
        <div class="set-modal-meta">${setNum}</div>
      </div>
      <button class="modal-close" onclick="this.closest('.set-modal').remove();history.pushState({app:true},'')">✕</button>
    </div>
    <div id="set-modal-body" style="color:var(--muted);font-size:14px;">Loading...</div>
  `;
  modal.addEventListener('click', (e) => { if (e.target === modal) { modal.remove(); history.pushState({app:true},''); } });
  document.body.appendChild(modal);

  try {
    const res = await fetch(`https://rebrickable.com/api/v3/lego/sets/${setNum}/?key=${RB_API_KEY}`);
    if (!res.ok) throw new Error(`API error: ${res.status}`);
    const set = await res.json();
    document.getElementById('set-modal-body').innerHTML = `
      <img src="${set.set_img_url || ''}" alt="${set.name || setName}" onerror="this.style.display='none'">
      <div style="font-size:14px;color:var(--muted);">${set.year || ''} · ${set.num_parts || ''} parts</div>
      <a class="set-modal-link" href="https://rebrickable.com/sets/${setNum}/" target="_blank" rel="noopener noreferrer">View on Rebrickable ↗</a>
    `;
  } catch(e) {
    document.getElementById('set-modal-body').innerHTML = `<span style="color:#ff6b6b">Could not load set details: ${e.message}</span>`;
  }
}
</script>
