<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="manifest.json?">
<title>Mega Brick Finder</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --border: #2a2a38;
    --accent: #FFD600;
    --accent2: #e8380d;
    --cyan: #00C8FF;
    --text: #f0f0f5;
    --muted: #6b6b80;
    --success: #2ecc71;
    --radius: 16px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow-x: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
  }

  /* ── HEADER ── */
  header {
    padding: 16px 20px 0;
    display: flex;
    align-items: center;
    gap: 14px;
    position: relative;
    z-index: 10;
  }

  .logo-svg {
    width: 54px;
    height: 54px;
    flex-shrink: 0;
  }

  .logo-text-block { line-height: 1; }

  .logo-title {
    font-family: 'Arial Black', 'Bebas Neue', sans-serif;
    font-weight: 900;
    font-size: 22px;
    letter-spacing: 1px;
    line-height: 1;
  }

  .logo-title span.cyan { color: var(--cyan); }
  .logo-title span.yellow { color: var(--accent); }

  .logo-sub {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 3px;
  }

  /* ── MAIN ── */
  main {
    flex: 1;
    padding: 20px 20px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    max-width: 600px;
    width: 100%;
    margin: 0 auto;
  }

  /* ── CAMERA CARD ── */
  .camera-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  #preview-area {
    width: 100%;
    aspect-ratio: 1;
    background: var(--surface2);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    position: relative;
    overflow: hidden;
  }

  #preview-area.has-image { aspect-ratio: auto; }
  #captured-img { width: 100%; max-height: 320px; object-fit: contain; display: none; }
  #preview-area.has-image #captured-img { display: block; }
  #preview-area.has-image .placeholder-content { display: none; }

  .placeholder-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    color: var(--muted);
  }

  .camera-icon {
    width: 64px;
    height: 64px;
    border: 2px dashed var(--border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
  }

  .placeholder-content p { font-size: 14px; text-align: center; max-width: 200px; line-height: 1.4; }

  .corner { position: absolute; width: 20px; height: 20px; border-color: var(--accent); border-style: solid; opacity: 0.6; }
  .corner.tl { top: 12px; left: 12px; border-width: 2px 0 0 2px; border-radius: 3px 0 0 0; }
  .corner.tr { top: 12px; right: 12px; border-width: 2px 2px 0 0; border-radius: 0 3px 0 0; }
  .corner.bl { bottom: 12px; left: 12px; border-width: 0 0 2px 2px; border-radius: 0 0 0 3px; }
  .corner.br { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; border-radius: 0 0 3px 0; }

  .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); }

  .btn-row button {
    background: var(--surface);
    border: none;
    color: var(--text);
    padding: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-row button:active { background: var(--surface2); }
  .btn-row button.primary { color: var(--accent); }
  #file-input { display: none; }

  /* ── IDENTIFY BUTTON ── */
  #identify-btn {
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: var(--radius);
    padding: 16px;
    font-family: 'Arial Black', sans-serif;
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 2px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
    box-shadow: 0 4px 20px rgba(255,214,0,0.3);
  }

  #identify-btn:disabled {
    background: var(--surface2);
    color: var(--muted);
    box-shadow: none;
    cursor: not-allowed;
  }

  #identify-btn:not(:disabled):active { transform: scale(0.98); box-shadow: 0 2px 10px rgba(255,214,0,0.2); }

  /* ── MANUAL INPUT ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--muted);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .manual-row { display: flex; gap: 10px; }

  .manual-row input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  .manual-row input:focus { border-color: var(--accent); }
  .manual-row input::placeholder { color: var(--muted); }

  .manual-row button {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 14px 18px;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .manual-row button:active { background: var(--border); }

  /* ── STATUS ── */
  #status {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    font-size: 14px;
    color: var(--muted);
    display: none;
    align-items: center;
    gap: 10px;
  }

  #status.visible { display: flex; }
  #status.error { border-color: var(--accent2); color: #ff6b6b; }
  #status.success { border-color: var(--success); color: var(--success); }

  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── RESULTS ── */
  #results { display: none; flex-direction: column; gap: 16px; }
  #results.visible { display: flex; }

  .part-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .part-header { display: flex; gap: 16px; padding: 16px; align-items: flex-start; }

  .part-img {
    width: 80px; height: 80px;
    object-fit: contain;
    background: var(--surface2);
    border-radius: 10px;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }

  .part-img-placeholder {
    width: 80px; height: 80px;
    background: var(--surface2);
    border-radius: 10px;
    flex-shrink: 0;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
  }

  .part-info { flex: 1; min-width: 0; }

  .part-num {
    font-family: 'Arial Black', sans-serif;
    font-size: 20px;
    font-weight: 900;
    letter-spacing: 1px;
    color: var(--accent);
    line-height: 1;
  }

  .part-name { font-size: 14px; color: var(--text); margin-top: 4px; line-height: 1.3; }
  .part-meta { font-size: 12px; color: var(--muted); margin-top: 6px; }

  .score-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 12px;
    color: var(--accent);
    font-weight: 600;
    flex-shrink: 0;
    align-self: flex-start;
  }

  .sets-label {
    padding: 12px 16px 10px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    font-weight: 600;
    border-top: 1px solid var(--border);
  }

  .set-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    transition: background 0.15s;
  }

  .set-row:active { background: var(--surface2); }

  .set-dot { width: 8px; height: 8px; background: var(--cyan); border-radius: 50%; flex-shrink: 0; }
  .set-info { flex: 1; min-width: 0; }
  .set-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .set-detail { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .set-qty { font-family: 'Arial Black', sans-serif; font-size: 20px; font-weight: 900; color: var(--accent); flex-shrink: 0; }

  .no-sets { padding: 16px; text-align: center; color: var(--muted); font-size: 14px; border-top: 1px solid var(--border); }

  /* ── CANDIDATES ── */
  .candidates-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; padding: 14px 16px 10px; font-weight: 600; }

  .candidate-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    background: none;
    border-left: none; border-right: none; border-bottom: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    width: 100%;
    text-align: left;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .candidate-btn:active { background: var(--surface2); }

  .candidate-img {
    width: 80px; height: 80px;
    object-fit: contain;
    background: var(--surface2);
    border-radius: 8px;
    border: 1px solid var(--border);
    flex-shrink: 0;
  }

/* Lightbox */
.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.92);
  z-index: 200;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 24px;
}

.lightbox img {
  max-width: 100%;
  max-height: 60vh;
  object-fit: contain;
  border-radius: 12px;
}

.lightbox-name {
  font-size: 16px;
  font-weight: 500;
  text-align: center;
  color: var(--text);
}

.lightbox-close {
  position: absolute;
  top: 20px;
  right: 20px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 50%;
  width: 40px; height: 40px;
  color: var(--text);
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Set modal */
.set-modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.92);
  z-index: 200;
  display: flex;
  flex-direction: column;
  padding: 24px;
  gap: 16px;
  overflow-y: auto;
}

.set-modal-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

.set-modal img {
  width: 100%;
  max-height: 260px;
  object-fit: contain;
  border-radius: 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
}

.set-modal-title {
  font-family: 'Arial Black', sans-serif;
  font-size: 20px;
  font-weight: 900;
  color: var(--accent);
  line-height: 1.2;
}

.set-modal-meta {
  font-size: 13px;
  color: var(--muted);
  margin-top: 4px;
}

.set-modal-link {
  display: block;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  color: var(--cyan);
  text-decoration: none;
  font-size: 14px;
  text-align: center;
}

.modal-close {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 50%;
  width: 40px; height: 40px;
  color: var(--text);
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
 
  .candidate-info { flex: 1; min-width: 0; }
  .candidate-num { font-size: 13px; color: var(--accent); font-weight: 600; }
  .candidate-name { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .candidate-score { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* ── FOOTER ── */
  footer { padding: 16px 20px; text-align: center; font-size: 11px; color: var(--muted); letter-spacing: 0.5px; }

  /* ── LOADING OVERLAY ── */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10,10,15,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 100;
    backdrop-filter: blur(4px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .loading-overlay.visible { opacity: 1; pointer-events: all; }

  .loading-overlay .big-spinner {
    width: 48px; height: 48px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  .loading-overlay p {
    font-family: 'Arial Black', sans-serif;
    font-size: 16px;
    letter-spacing: 2px;
    color: var(--muted);
  }
</style>
</head>
<body>

  <div class="logo-text-block">

</header>

<main>

  <!-- Camera Card -->
  <div class="camera-card">
    <div id="preview-area">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <div class="placeholder-content">
        <div class="camera-icon">📷</div>
        <p>Take a photo of a LEGO part to identify it</p>
      </div>
      <img id="captured-img" alt="Captured part">
    </div>
    <div class="btn-row">
      <button class="primary" onclick="document.getElementById('file-input').click()">
        📷 Take Photo
      </button>
      <button onclick="clearImage()">✕ Clear</button>
    </div>
  </div>

  <input type="file" id="file-input" accept="image/*" capture="environment">

  <!-- Identify Button -->
  <button id="identify-btn" disabled onclick="identifyPart()">
    🔍 IDENTIFY PART
  </button>

  <!-- Divider -->
  <div class="divider">or enter manually</div>

  <!-- Manual Input -->
  <div class="manual-row">
    <input type="text" id="manual-input" placeholder="Part number (e.g. 3001)" autocomplete="off" autocorrect="off" spellcheck="false">
    <button onclick="manualLookup()">→</button>
  </div>

  <!-- Status -->
  <div id="status"></div>

  <!-- Results -->
  <div id="results"></div>

</main>

<footer>Powered by Brickognize &amp; Rebrickable</footer>

<script>
const SHEETS_API  = 'https://script.google.com/macros/s/AKfycbwWY3esy4NF6Ejt1n91NPPdX-qiXvCfGqpwddxbtuV2KbDKO_Yp0CdUrE1e0zI82K3F/exec';
const RB_API_KEY = 'ca9806a231f7e5c7b07d05d39c4651f2';

let capturedFile = null;
let partsInventory = [];
let setsInventory = [];
let inventoryLoaded = false;

document.getElementById('file-input').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  capturedFile = file;
  const url = URL.createObjectURL(file);
  const img = document.getElementById('captured-img');
  img.src = url;
  document.getElementById('preview-area').classList.add('has-image');
  document.getElementById('identify-btn').disabled = false;
  clearResults();
});

document.getElementById('manual-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') manualLookup();
});

loadInventory();

async function loadInventory() {
  try {
    const [partsRes, setsRes] = await Promise.all([
      fetch(`${SHEETS_API}?action=getParts`),
      fetch(`${SHEETS_API}?action=getSets`)
    ]);
    partsInventory = await partsRes.json();
    setsInventory  = await setsRes.json();
    inventoryLoaded = true;
  } catch (e) {
    console.error('Failed to load inventory:', e);
  }
}

function clearImage() {
  capturedFile = null;
  document.getElementById('captured-img').src = '';
  document.getElementById('preview-area').classList.remove('has-image');
  document.getElementById('identify-btn').disabled = true;
  document.getElementById('file-input').value = '';
  clearResults();
}

async function identifyPart() {
  if (!capturedFile) return;
  showLoading('IDENTIFYING PART...');
  try {
    // Compress image before sending
    const formData = new FormData();
    const renamed = new File([capturedFile], 'image.jpg', { type: 'image/jpeg' });
    formData.append('query_image', renamed);
    const res = await fetch('https://api.brickognize.com/predict/', { method: 'POST', body: formData });
    if (!res.ok) {
      const errText = await res.text();
      throw new Error(`Brickognize error: ${res.status} — ${errText}`);
    }
    const data = await res.json();
    hideLoading();
    if (!data.items || data.items.length === 0) {
      showStatus('No parts identified. Try a clearer photo.', 'error');
      return;
    }
    const items = data.items;
    if (items.length === 1 || items[0].score > 0.85) {
      await showPartResult(items[0]);
    } else {
      showCandidates(items.slice(0, 5));
    }
  } catch (e) {
    hideLoading();
    showStatus(`Error: ${e.message}`, 'error');
  }
}

function compressImage(file, maxSize, quality) {
  return new Promise((resolve) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      if (w > h && w > maxSize) { h = h * maxSize / w; w = maxSize; }
      else if (h > maxSize) { w = w * maxSize / h; h = maxSize; }
      canvas.width = w;
      canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      canvas.toBlob(resolve, 'image/jpeg', quality);
    };
    img.src = url;
  });
}

function getDominantColor(imgElement) {
  try {
    const canvas = document.createElement('canvas');
    const size = 100;
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(imgElement, 0, 0, size, size);
    
    // Sample pixels from the center region (avoid background edges)
    const centerX = size * 0.25, centerY = size * 0.25;
    const centerW = size * 0.5, centerH = size * 0.5;
    const data = ctx.getImageData(centerX, centerY, centerW, centerH).data;
    
    // Average the RGB values
    let r = 0, g = 0, b = 0, count = 0;
    for (let i = 0; i < data.length; i += 4) {
      // Skip near-white (background) and near-black pixels
      const pr = data[i], pg = data[i+1], pb = data[i+2];
      const brightness = (pr + pg + pb) / 3;
      if (brightness > 240 || brightness < 15) continue;
      r += pr; g += pg; b += pb; count++;
    }
    if (count === 0) return null;
    return { r: Math.round(r/count), g: Math.round(g/count), b: Math.round(b/count) };
  } catch(e) {
    return null;
  }
}

function matchLegoColor(rgb, availableColors) {
  if (!rgb) return null;

  // LEGO color name → approximate RGB
  const legoColors = {
    'Black': {r:33,g:33,b:33},
    'White': {r:242,g:243,b:242},
    'Light Bluish Gray': {r:171,g:173,b:172},
    'Dark Bluish Gray': {r:108,g:110,b:104},
    'Red': {r:196,g:40,b:27},
    'Blue': {r:13,g:105,b:171},
    'Yellow': {r:245,g:205,b:47},
    'Green': {r:75,g:151,b:74},
    'Orange': {r:254,g:138,b:24},
    'Dark Orange': {r:169,g:85,b:10},
    'Brown': {r:88,g:57,b:39},
    'Tan': {r:222,g:198,b:156},
    'Dark Tan': {r:138,g:114,b:78},
    'Lime': {r:165,g:202,b:24},
    'Medium Blue': {r:115,g:150,b:200},
    'Dark Blue': {r:20,g:48,b:100},
    'Dark Green': {r:39,g:70,b:44},
    'Magenta': {r:144,g:31,b:95},
    'Pink': {r:252,g:185,b:193},
    'Purple': {r:107,g:50,b:124},
    'Dark Purple': {r:63,g:24,b:99},
    'Bright Pink': {r:228,g:173,b:200},
    'Medium Lavender': {r:160,g:110,b:185},
    'Lavender': {r:205,g:164,b:222},
    'Sand Blue': {r:112,g:142,b:169},
    'Sand Green': {r:120,g:144,b:129},
    'Dark Red': {r:114,g:14,b:15},
    'Coral': {r:255,g:109,b:90},
    'Nougat': {r:204,g:142,b:104},
    'Medium Nougat': {r:175,g:116,b:70},
    'Trans-Clear': {r:236,g:236,b:236},
    'Trans-Red': {r:196,g:40,b:27},
    'Trans-Blue': {r:13,g:105,b:171},
    'Trans-Yellow': {r:245,g:205,b:47},
    'Trans-Green': {r:75,g:151,b:74},
    'Trans-Orange': {r:254,g:138,b:24},
  };

  // Only match against colors actually in the user's inventory
  let bestMatch = null;
  let bestDistance = Infinity;

  availableColors.forEach(colorName => {
    // Find closest LEGO color definition
    const known = legoColors[colorName];
    if (!known) return;
    const dist = Math.sqrt(
      Math.pow(rgb.r - known.r, 2) +
      Math.pow(rgb.g - known.g, 2) +
      Math.pow(rgb.b - known.b, 2)
    );
    if (dist < bestDistance) {
      bestDistance = dist;
      bestMatch = colorName;
    }
  });

  // Only return a match if we're reasonably confident (distance < 120)
  return bestDistance < 120 ? { color: bestMatch, confidence: Math.round((1 - bestDistance/120) * 100) } : null;
}
 
async function showPartResult(item) {
  clearResults();
  if (!inventoryLoaded) {
    showLoading('LOADING INVENTORY...');
    await loadInventory();
    hideLoading();
  }
  const partNum = item.id;
  const scorePercent = item.score < 1 ? Math.round(item.score * 100) + '%' : null;

  // Get all matches first
  const allMatches = partsInventory.filter(p =>
    p['Part Number'] && p['Part Number'].toString().toLowerCase() === partNum.toString().toLowerCase()
  );

  // Try color detection from captured image
  let detectedColor = null;
  if (capturedFile) {
    const tempImg = new Image();
    await new Promise(resolve => {
      tempImg.onload = resolve;
      tempImg.src = URL.createObjectURL(capturedFile);
    });
    const availableColors = [...new Set(allMatches.map(m => m['Color']))];
    const rgb = getDominantColor(tempImg);
    console.log('RGB detected:', rgb);
    detectedColor = matchLegoColor(rgb, availableColors);
    console.log('Color match:', detectedColor);
    console.log('Available colors:', availableColors);
  }

  // Filter by detected color, fall back to all matches
  const matches = detectedColor
    ? allMatches.filter(m => m['Color'] === detectedColor.color)
    : allMatches;

  const bySet = {};
  matches.forEach(m => {
    const sn = m['Set Number'];
    if (!bySet[sn]) bySet[sn] = [];
    bySet[sn].push(m);
  });

  const setNameMap = {};
  setsInventory.forEach(s => { setNameMap[s['Set Number']] = s['Name']; });

  const results = document.getElementById('results');
  results.classList.add('visible');

  const card = document.createElement('div');
  card.className = 'part-card';

  const imgHtml = item.img_url
    ? `<img class="part-img" src="${item.img_url}" alt="${item.name || ''}" onerror="this.parentElement.innerHTML='<div class=\\'part-img-placeholder\\'>🧱</div>'">`
    : `<div class="part-img-placeholder">🧱</div>`;

  const scoreBadge = scorePercent ? `<div class="score-badge">${scorePercent}</div>` : '';

  const setCount = Object.keys(bySet).length;
  card.innerHTML = `
    <div class="part-header">
      ${imgHtml}
      <div class="part-info">
        <div class="part-num">${partNum}</div>
        <div class="part-name">${item.name || 'Unknown part'}</div>
        <div class="part-meta"><a href="https://rebrickable.com/parts/${partNum}/" target="_blank" style="color:var(--muted);text-decoration:none;">View on Rebrickable ↗</a></div>
      </div>
      ${scoreBadge}
    </div>
  ${detectedColor ? `
    <div style="padding:10px 16px;border-top:1px solid var(--border);font-size:12px;display:flex;align-items:center;gap:10px;">
      <span style="color:var(--muted);text-transform:uppercase;letter-spacing:1px;">Detected color</span>
      <span style="color:var(--accent);font-weight:600;">${detectedColor.color}</span>
      <span style="color:var(--muted)">${detectedColor.confidence}% confidence</span>
      <button onclick="showAllColors()" style="margin-left:auto;background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:11px;padding:3px 8px;cursor:pointer;">Show all colors</button>
    </div>` : ''}
    <div class="sets-label">Found in ${setCount} set(s) in your collection</div>`;

  if (setCount === 0) {
    card.innerHTML += `<div class="no-sets">This part isn't in any of your sets.</div>`;
  } else {
    Object.entries(bySet).forEach(([setNum, parts]) => {
      const setName = setNameMap[setNum] || setNum;
      const colors = [...new Set(parts.map(p => p['Color']))].join(', ');
      const totalQty = parts.reduce((sum, p) => sum + (parseInt(p['Quantity']) || 0), 0);
      const row = document.createElement('div');
      row.className = 'set-row';
      row.style.cursor = 'pointer';
      row.innerHTML = `
        <div class="set-dot"></div>
        <div class="set-info">
          <div class="set-name">${setName}</div>
          <div class="set-detail">${setNum} · ${colors}</div>
        </div>
        <div class="set-qty">×${totalQty}</div>
        <div style="font-size:18px;color:var(--muted);padding-left:8px;">›</div>
      `;
      row.addEventListener('click', () => showSetModal(setNum, setName));
      card.appendChild(row);
    });
  }

  results.appendChild(card);
}

async function showSetModal(setNum, setName) {
  pushModalState();
  const modal = document.createElement('div');
  modal.className = 'set-modal';
  modal.innerHTML = `
    <div class="set-modal-header">
      <div>
        <div class="set-modal-title">${setName}</div>
        <div class="set-modal-meta">${setNum}</div>
      </div>
      <button class="modal-close" onclick="this.closest('.set-modal').remove()">✕</button>
    </div>
    <div id="set-modal-body" style="color:var(--muted);font-size:14px;">Loading...</div>
  `;
  modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
  document.body.appendChild(modal);

  try {
    const res = await fetch(`https://rebrickable.com/api/v3/lego/sets/${setNum}/`, {
      headers: { 'Authorization': `key ${RB_API_KEY}` }
    });
    if (!res.ok) throw new Error(`API error: ${res.status}`);
    const set = await res.json();
    const rebrickableUrl = `https://rebrickable.com/sets/${setNum}/`;
    document.getElementById('set-modal-body').innerHTML = `
      <img src="${set.set_img_url || ''}" alt="${set.name || setName}" onerror="this.style.display='none'">
      <div style="font-size:14px;color:var(--muted);">${set.year || ''} · ${set.num_parts || ''} parts</div>
      <a class="set-modal-link" href="${rebrickableUrl}" target="_blank">View on Rebrickable ↗</a>
    `;
  } catch(e) {
    document.getElementById('set-modal-body').innerHTML = `<span style="color:#ff6b6b">Could not load set details: ${e.message}</span>`;
  }
}
